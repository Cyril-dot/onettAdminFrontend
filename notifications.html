<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications — MarketPlace Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    :root {
      --nt-accent:       #F59E0B;
      --nt-accent-light: #FEF3C7;
      --nt-accent-mid:   #FDE68A;
      --nt-accent-dark:  #D97706;
      --nt-accent-glow:  rgba(245,158,11,.18);
      --font-display:    'Bricolage Grotesque', sans-serif;
      --font-mono:       'DM Mono', monospace;
    }

    .nav-link.active { background: rgba(245,158,11,.14); }
    .nav-link.active::before { background: var(--nt-accent); }

    /* ── Header ── */
    .nt-header { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:28px; flex-wrap:wrap; }
    .nt-header-left .nt-title { font-family:var(--font-display); font-size:26px; font-weight:800; color:var(--text); letter-spacing:-.6px; line-height:1.15; }
    .nt-header-left .nt-subtitle { font-size:13px; color:var(--text-muted); margin-top:4px; font-weight:400; }
    .nt-header-right { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

    /* ── Stats ── */
    .nt-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
    .nt-stat { background:var(--white); border-radius:14px; border:1px solid var(--gray-100); padding:18px 20px; position:relative; overflow:hidden; transition:transform .16s,box-shadow .16s; }
    .nt-stat:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.08); }
    .nt-stat::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:14px 14px 0 0; }
    .nt-stat.amber::before  { background:var(--nt-accent); }
    .nt-stat.blue::before   { background:#3B82F6; }
    .nt-stat.green::before  { background:#10B981; }
    .nt-stat.purple::before { background:#8B5CF6; }
    .nt-stat-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
    .nt-stat-icon .material-symbols-rounded { font-size:20px; }
    .nt-stat.amber  .nt-stat-icon { background:var(--nt-accent-light); color:var(--nt-accent-dark); }
    .nt-stat.blue   .nt-stat-icon { background:#DBEAFE; color:#2563EB; }
    .nt-stat.green  .nt-stat-icon { background:#D1FAE5; color:#059669; }
    .nt-stat.purple .nt-stat-icon { background:#EDE9FE; color:#7C3AED; }
    .nt-stat-num { font-family:var(--font-display); font-size:28px; font-weight:800; letter-spacing:-.8px; color:var(--text); line-height:1; }
    .nt-stat-label { font-size:12px; color:var(--text-muted); font-weight:500; margin-top:4px; }

    /* ── Filter Pills ── */
    .nt-pills { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:24px; }
    .nt-pill { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:99px; border:1.5px solid var(--gray-200); background:var(--white); font-size:12px; font-weight:700; color:var(--text-muted); cursor:pointer; transition:all .16s; font-family:var(--font-display); white-space:nowrap; }
    .nt-pill:hover { border-color:var(--nt-accent); color:var(--nt-accent-dark); background:var(--nt-accent-light); }
    .nt-pill.active { background:var(--nt-accent); border-color:var(--nt-accent); color:#fff; }
    .nt-pill .pill-count { background:rgba(255,255,255,.3); border-radius:99px; padding:1px 7px; font-size:10px; font-weight:800; }
    .nt-pill:not(.active) .pill-count { background:var(--gray-100); color:var(--text-muted); }

    /* ── Card ── */
    .nt-card { background:var(--white); border-radius:16px; border:1px solid var(--gray-100); box-shadow:0 1px 4px rgba(0,0,0,.06); overflow:hidden; }
    .nt-card-header { display:flex; align-items:center; justify-content:space-between; padding:20px 24px 16px; border-bottom:1px solid var(--gray-100); gap:12px; flex-wrap:wrap; }
    .nt-card-title { font-family:var(--font-display); font-size:15px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:8px; }
    .nt-card-title .material-symbols-rounded { font-size:18px; color:var(--nt-accent); }

    /* ── Notification Items ── */
    .nt-list { display:flex; flex-direction:column; }

    .nt-item {
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:14px;
      padding:18px 24px;
      border-bottom:1px solid var(--gray-100);
      transition:background .12s;
      align-items:flex-start;
      cursor:pointer;
      position:relative;
    }
    .nt-item:last-child { border-bottom:none; }
    .nt-item:hover { background:#FFFBEB; }
    .nt-item.unread { background:#FFFDF0; }
    .nt-item.unread::before {
      content:'';
      position:absolute;
      left:0; top:0; bottom:0;
      width:3px;
      background:var(--nt-accent);
      border-radius:0 2px 2px 0;
    }

    .nt-item-icon {
      width:40px; height:40px;
      border-radius:11px;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .nt-item-icon .material-symbols-rounded { font-size:20px; }

    /* Type colours */
    .nt-type-ORDER_CONFIRMED      .nt-item-icon,
    .nt-type-ORDER_UPDATE         .nt-item-icon { background:#D1FAE5; color:#059669; }
    .nt-type-PAYMENT_FAILED       .nt-item-icon { background:#FEE2E2; color:#DC2626; }
    .nt-type-ORDER_CANCELLED      .nt-item-icon { background:#FEE2E2; color:#DC2626; }
    .nt-type-ORDER_STATUS_CHANGED .nt-item-icon { background:#DBEAFE; color:#2563EB; }
    .nt-type-NEW_MESSAGE          .nt-item-icon { background:#EDE9FE; color:#7C3AED; }
    .nt-type-PRODUCT_REQUEST_SUBMITTED .nt-item-icon { background:#FEF3C7; color:#D97706; }
    .nt-type-PRODUCT_REQUEST_APPROVED  .nt-item-icon { background:#D1FAE5; color:#059669; }
    .nt-type-PRODUCT_REQUEST_REJECTED  .nt-item-icon { background:#FEE2E2; color:#DC2626; }
    .nt-type-NEW_PRODUCT_ADDED    .nt-item-icon { background:#DBEAFE; color:#2563EB; }
    .nt-type-CART_UPDATED         .nt-item-icon { background:#F5F3FF; color:#7C3AED; }

    .nt-item-body { min-width:0; }
    .nt-item-title { font-family:var(--font-display); font-size:13.5px; font-weight:700; color:var(--text); margin-bottom:4px; line-height:1.3; }
    .nt-item.unread .nt-item-title { color:#1a1a1a; }
    .nt-item-msg { font-size:12.5px; color:var(--text-muted); line-height:1.55; }
    .nt-item-meta { display:flex; align-items:center; gap:8px; margin-top:7px; flex-wrap:wrap; }
    .nt-item-time { font-family:var(--font-mono); font-size:11px; color:var(--gray-400); }
    .nt-type-chip { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:99px; font-size:10px; font-weight:700; font-family:var(--font-display); background:var(--gray-100); color:var(--gray-500); }

    .nt-item-actions { display:flex; gap:6px; flex-shrink:0; }
    .nt-icon-btn { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; border:1.5px solid var(--gray-200); background:var(--white); cursor:pointer; transition:all .14s; color:var(--text-muted); }
    .nt-icon-btn:hover { border-color:var(--nt-accent); color:var(--nt-accent-dark); background:var(--nt-accent-light); }
    .nt-icon-btn .material-symbols-rounded { font-size:15px; }

    /* Buttons */
    .nt-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:9px; font-size:12px; font-weight:700; font-family:var(--font-display); cursor:pointer; transition:all .14s; border:none; }
    .nt-btn.primary { background:var(--nt-accent); color:#fff; }
    .nt-btn.primary:hover { background:var(--nt-accent-dark); box-shadow:0 4px 14px var(--nt-accent-glow); }
    .nt-btn.ghost { background:var(--white); border:1.5px solid var(--gray-200); color:var(--gray-600); }
    .nt-btn.ghost:hover { border-color:var(--nt-accent); color:var(--nt-accent-dark); background:var(--nt-accent-light); }
    .nt-btn.danger { background:#FEE2E2; color:#B91C1C; border:1px solid #FECACA; }
    .nt-btn.danger:hover { background:#FECACA; }
    .nt-btn .material-symbols-rounded { font-size:15px; }
    .nt-btn.loading .material-symbols-rounded { animation:spin .8s linear infinite; }

    /* Search */
    .nt-search-wrap { display:flex; align-items:center; gap:8px; background:var(--gray-50); border:1.5px solid var(--gray-200); border-radius:10px; padding:7px 12px; min-width:220px; }
    .nt-search-wrap .material-symbols-rounded { font-size:17px; color:var(--text-muted); }
    .nt-search-wrap input { border:none; background:transparent; font-size:13px; color:var(--text); outline:none; font-family:var(--font-display); width:100%; }
    .nt-search-wrap:focus-within { border-color:var(--nt-accent); background:var(--nt-accent-light); }

    /* Total chip */
    .nt-total-chip { display:inline-flex; align-items:center; gap:6px; background:var(--nt-accent-light); color:var(--nt-accent-dark); border-radius:99px; padding:4px 12px; font-size:12px; font-weight:700; font-family:var(--font-display); }

    /* Empty */
    .nt-empty { display:flex; flex-direction:column; align-items:center; gap:12px; padding:80px 24px; text-align:center; }
    .nt-empty-icon { width:72px; height:72px; border-radius:20px; background:var(--nt-accent-light); display:flex; align-items:center; justify-content:center; }
    .nt-empty-icon .material-symbols-rounded { font-size:34px; color:var(--nt-accent); }
    .nt-empty-title { font-family:var(--font-display); font-size:16px; font-weight:800; color:var(--gray-500); }
    .nt-empty-sub { font-size:13px; color:var(--text-muted); max-width:280px; line-height:1.6; }

    /* Skeleton */
    .nt-skel { height:14px; border-radius:6px; background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
    .nt-skel.sm { width:70px; height:10px; }
    .nt-skel.md { width:140px; }
    .nt-skel.lg { width:240px; }

    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    @keyframes spin    { to{transform:rotate(360deg)} }

    @media (max-width:900px) { .nt-stats { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:640px) {
      .nt-stats { grid-template-columns:1fr 1fr; gap:10px; }
      .nt-stat-num { font-size:22px; }
      .nt-header-left .nt-title { font-size:20px; }
      .nt-item { grid-template-columns:auto 1fr; }
      .nt-item-actions { display:none; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="api.js"></script>
<script src="layout.js"></script>
<script>
requireAuth();

let currentFilter = 'all';
window._allNotifs = [];

// Type → icon + label map
const TYPE_META = {
  ORDER_CONFIRMED:            { icon: 'check_circle',    label: 'Order',    color: 'green'  },
  ORDER_UPDATE:               { icon: 'receipt_long',    label: 'Order',    color: 'green'  },
  ORDER_STATUS_CHANGED:       { icon: 'swap_horiz',      label: 'Status',   color: 'blue'   },
  ORDER_CANCELLED:            { icon: 'cancel',          label: 'Cancel',   color: 'red'    },
  PAYMENT_FAILED:             { icon: 'error',           label: 'Payment',  color: 'red'    },
  NEW_MESSAGE:                { icon: 'forum',           label: 'Message',  color: 'purple' },
  PRODUCT_REQUEST_SUBMITTED:  { icon: 'pending_actions', label: 'Request',  color: 'amber'  },
  PRODUCT_REQUEST_APPROVED:   { icon: 'task_alt',        label: 'Approved', color: 'green'  },
  PRODUCT_REQUEST_REJECTED:   { icon: 'highlight_off',   label: 'Rejected', color: 'red'    },
  PRODUCT_REQUEST_VIEWED:     { icon: 'visibility',      label: 'Viewed',   color: 'blue'   },
  NEW_PRODUCT_ADDED:          { icon: 'inventory_2',     label: 'Product',  color: 'blue'   },
  CART_UPDATED:               { icon: 'shopping_cart',   label: 'Cart',     color: 'purple' },
};

const FILTER_CONFIG = [
  { key: 'all',     label: 'All',      icon: 'notifications'      },
  { key: 'unread',  label: 'Unread',   icon: 'mark_email_unread'  },
  { key: 'ORDER',   label: 'Orders',   icon: 'receipt_long'       },
  { key: 'PAYMENT', label: 'Payments', icon: 'payments'           },
  { key: 'REQUEST', label: 'Requests', icon: 'pending_actions'    },
  { key: 'MESSAGE', label: 'Messages', icon: 'forum'              },
  { key: 'PRODUCT', label: 'Products', icon: 'inventory_2'        },
];

const content = `
<div class="nt-header">
  <div class="nt-header-left">
    <div class="nt-title">Notifications</div>
    <div class="nt-subtitle">Stay on top of every activity across the platform</div>
  </div>
  <div class="nt-header-right">
    <button class="nt-btn ghost" id="refreshBtn" onclick="loadAll()">
      <span class="material-symbols-rounded">refresh</span>
      Refresh
    </button>
    <button class="nt-btn primary" onclick="markAllRead()">
      <span class="material-symbols-rounded">done_all</span>
      Mark All Read
    </button>
  </div>
</div>

<div class="nt-stats">
  <div class="nt-stat amber">
    <div class="nt-stat-icon"><span class="material-symbols-rounded">notifications_active</span></div>
    <div class="nt-stat-num" id="statUnread">—</div>
    <div class="nt-stat-label">Unread</div>
  </div>
  <div class="nt-stat blue">
    <div class="nt-stat-icon"><span class="material-symbols-rounded">notifications</span></div>
    <div class="nt-stat-num" id="statTotal">—</div>
    <div class="nt-stat-label">Total</div>
  </div>
  <div class="nt-stat green">
    <div class="nt-stat-icon"><span class="material-symbols-rounded">receipt_long</span></div>
    <div class="nt-stat-num" id="statOrders">—</div>
    <div class="nt-stat-label">Order Alerts</div>
  </div>
  <div class="nt-stat purple">
    <div class="nt-stat-icon"><span class="material-symbols-rounded">pending_actions</span></div>
    <div class="nt-stat-num" id="statRequests">—</div>
    <div class="nt-stat-label">Request Alerts</div>
  </div>
</div>

<div class="nt-pills" id="filterPills"></div>

<div class="nt-card">
  <div class="nt-card-header">
    <div class="nt-card-title">
      <span class="material-symbols-rounded">notifications</span>
      Notification Feed
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div class="nt-search-wrap">
        <span class="material-symbols-rounded">search</span>
        <input type="text" id="ntSearch" placeholder="Search notifications..." oninput="filterNotifs()"/>
      </div>
      <div class="nt-total-chip">
        <span class="material-symbols-rounded" style="font-size:13px">tag</span>
        <span id="ntCount">—</span> notifications
      </div>
    </div>
  </div>
  <div class="nt-list" id="ntList">
    ${skeletonItems()}
  </div>
</div>
`;

renderLayout('Notifications', 'notifications.html', content);
buildFilterPills();
loadAll();

/* ── Skeleton ─────────────────────────────────────────────── */

function skeletonItems() {
  return Array(6).fill(0).map(() => `
    <div class="nt-item" style="cursor:default">
      <div style="width:40px;height:40px;background:var(--gray-100);border-radius:11px;flex-shrink:0"></div>
      <div>
        <div class="nt-skel md" style="margin-bottom:8px"></div>
        <div class="nt-skel lg" style="margin-bottom:6px"></div>
        <div class="nt-skel sm"></div>
      </div>
    </div>
  `).join('');
}

/* ── Filter Pills ─────────────────────────────────────────── */

function buildFilterPills() {
  const container = document.getElementById('filterPills');
  if (!container) return;
  container.innerHTML = FILTER_CONFIG.map(f => `
    <button class="nt-pill ${f.key === 'all' ? 'active' : ''}"
            data-key="${f.key}"
            onclick="switchFilter('${f.key}')">
      <span class="material-symbols-rounded" style="font-size:13px">${f.icon}</span>
      ${f.label}
      <span class="pill-count" id="fc-${f.key}">—</span>
    </button>
  `).join('');
}

function switchFilter(key) {
  currentFilter = key;
  document.querySelectorAll('.nt-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.key === key);
  });
  applyFilter();
}

/* ── Load Data ────────────────────────────────────────────── */

async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.classList.add('loading');

  const res = await API.getNotifications(false);

  if (btn) btn.classList.remove('loading');

  if (!res.ok) {
    document.getElementById('ntList').innerHTML = `
      <div class="nt-empty">
        <div class="nt-empty-icon"><span class="material-symbols-rounded">error</span></div>
        <div class="nt-empty-title">Failed to load notifications</div>
        <div class="nt-empty-sub">${res.data?.message || 'Please try refreshing the page.'}</div>
      </div>`;
    return;
  }

  const data = res.data?.data || res.data || [];
  window._allNotifs = Array.isArray(data) ? data : [];

  updateStats(window._allNotifs);
  updatePillCounts(window._allNotifs);
  applyFilter();
}

/* ── Stats + Pill Counts ──────────────────────────────────── */

function updateStats(notifs) {
  const unread   = notifs.filter(n => !n.isRead && !n.read).length;
  const orders   = notifs.filter(n => (n.type || '').includes('ORDER') || (n.type || '').includes('PAYMENT')).length;
  const requests = notifs.filter(n => (n.type || '').includes('PRODUCT_REQUEST')).length;

  set('statUnread',   unread);
  set('statTotal',    notifs.length);
  set('statOrders',   orders);
  set('statRequests', requests);

  const badge = document.getElementById('notifBadge');
  if (badge) {
    badge.textContent   = unread > 0 ? unread : '';
    badge.style.display = unread > 0 ? '' : 'none';
  }
}

function updatePillCounts(notifs) {
  const counts = {
    all:     notifs.length,
    unread:  notifs.filter(n => !n.isRead && !n.read).length,
    ORDER:   notifs.filter(n => (n.type || '').includes('ORDER')).length,
    PAYMENT: notifs.filter(n => (n.type || '').includes('PAYMENT')).length,
    REQUEST: notifs.filter(n => (n.type || '').includes('REQUEST')).length,
    MESSAGE: notifs.filter(n => (n.type || '').includes('MESSAGE')).length,
    PRODUCT: notifs.filter(n => (n.type || '').includes('PRODUCT') && !(n.type || '').includes('REQUEST')).length,
  };
  Object.entries(counts).forEach(([key, count]) => {
    const el = document.getElementById('fc-' + key);
    if (el) el.textContent = count;
  });
}

/* ── Filter + Search ──────────────────────────────────────── */

function applyFilter() {
  const q = (document.getElementById('ntSearch')?.value || '').toLowerCase();
  let list = window._allNotifs || [];

  if (currentFilter === 'unread') {
    list = list.filter(n => !n.isRead && !n.read);
  } else if (currentFilter !== 'all') {
    list = list.filter(n => (n.type || '').includes(currentFilter));
  }

  if (q) {
    list = list.filter(n =>
      (n.title   || '').toLowerCase().includes(q) ||
      (n.message || '').toLowerCase().includes(q) ||
      (n.type    || '').toLowerCase().includes(q)
    );
  }

  renderNotifs(list);
  const el = document.getElementById('ntCount');
  if (el) el.textContent = list.length;
}

function filterNotifs() {
  applyFilter();
}

/* ── Render ───────────────────────────────────────────────── */

function renderNotifs(items) {
  const container = document.getElementById('ntList');
  if (!container) return;

  if (!items.length) {
    // FIX: apostrophe moved outside template literal to avoid parse errors
    const emptyMsg = currentFilter === 'unread'
      ? "You're all caught up! No unread notifications."
      : 'Nothing to show for this filter.';

    container.innerHTML = `
      <div class="nt-empty">
        <div class="nt-empty-icon"><span class="material-symbols-rounded">notifications_off</span></div>
        <div class="nt-empty-title">No notifications here</div>
        <div class="nt-empty-sub">${emptyMsg}</div>
      </div>`;
    return;
  }

  container.innerHTML = items.map(n => {
    const type     = n.type || '';
    const meta     = TYPE_META[type] || { icon: 'notifications', label: type.replace(/_/g, ' ') || 'General', color: 'amber' };
    const isUnread = !n.isRead && !n.read;
    const nid      = n.id || '';
    const refChip  = n.referenceId
      ? `<span style="font-family:var(--font-mono);font-size:10px;color:var(--gray-400)">#${String(n.referenceId).slice(-8).toUpperCase()}</span>`
      : '';
    const unreadBadge = isUnread
      ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--nt-accent-dark);font-family:var(--font-display)">
           <span style="width:6px;height:6px;border-radius:50%;background:var(--nt-accent);display:inline-block"></span>
           Unread
         </span>`
      : '';
    const actionBtn = isUnread
      ? `<button class="nt-icon-btn" title="Mark as read" onclick="event.stopPropagation();markRead('${nid}', this.closest('.nt-item'))">
           <span class="material-symbols-rounded">done</span>
         </button>`
      : `<button class="nt-icon-btn" title="Already read" style="opacity:.4;cursor:default">
           <span class="material-symbols-rounded">check_circle</span>
         </button>`;

    return `
    <div class="nt-item nt-type-${type} ${isUnread ? 'unread' : ''}" onclick="markRead('${nid}', this)">
      <div class="nt-item-icon">
        <span class="material-symbols-rounded">${meta.icon}</span>
      </div>
      <div class="nt-item-body">
        <div class="nt-item-title">${escHtml(n.title || 'Notification')}</div>
        <div class="nt-item-msg">${escHtml(n.message || '')}</div>
        <div class="nt-item-meta">
          <span class="nt-item-time">
            <span class="material-symbols-rounded" style="font-size:11px;vertical-align:middle">schedule</span>
            ${timeAgo(n.createdAt)}
          </span>
          <span class="nt-type-chip">
            <span class="material-symbols-rounded" style="font-size:10px">${meta.icon}</span>
            ${meta.label}
          </span>
          ${unreadBadge}
          ${refChip}
        </div>
      </div>
      <div class="nt-item-actions">
        ${actionBtn}
      </div>
    </div>`;
  }).join('');
}

/* ── Mark Read ────────────────────────────────────────────── */

async function markRead(id, el) {
  if (!id || !el) return;
  if (!el.classList.contains('unread')) return;

  const res = await API.markNotifRead(id);
  if (res.ok) {
    const notif = window._allNotifs.find(n => String(n.id) === String(id));
    if (notif) { notif.isRead = true; notif.read = true; }

    el.classList.remove('unread');
    updateStats(window._allNotifs);
    updatePillCounts(window._allNotifs);

    const btn = el.querySelector('.nt-icon-btn');
    if (btn) {
      btn.style.opacity = '.4';
      btn.style.cursor  = 'default';
      btn.querySelector('.material-symbols-rounded').textContent = 'check_circle';
    }
  } else {
    showToast(res.data?.message || 'Could not mark as read', 'error');
  }
}

async function markAllRead() {
  const unreadCount = (window._allNotifs || []).filter(n => !n.isRead && !n.read).length;
  if (unreadCount === 0) {
    showToast('No unread notifications', 'info');
    return;
  }

  const res = await API.markAllNotifsRead();
  if (res.ok) {
    showToast('All notifications marked as read!');
    window._allNotifs.forEach(n => { n.isRead = true; n.read = true; });
    updateStats(window._allNotifs);
    updatePillCounts(window._allNotifs);
    applyFilter();
  } else {
    showToast(res.data?.message || 'Failed to mark all as read', 'error');
  }
}

/* ── Helpers ──────────────────────────────────────────────── */

function timeAgo(str) {
  if (!str) return '—';
  const now  = new Date();
  const then = new Date(str);
  const diff = Math.floor((now - then) / 1000);
  if (diff < 60)     return 'Just now';
  if (diff < 3600)   return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400)  return Math.floor(diff / 3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return then.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function set(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}
</script>
